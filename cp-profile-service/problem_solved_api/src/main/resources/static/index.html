<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Profile Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #ffa116;
            text-align: center;
        }

        .subtitle {
            color: #8a8a8a;
            margin-bottom: 32px;
            font-size: 1rem;
            text-align: center;
        }

        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            width: 100%;
            max-width: 500px;
        }

        .search-container input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #2a2a4a;
            border-radius: 12px;
            font-size: 1rem;
            background: #1e1e3a;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input::placeholder {
            color: #666;
        }

        .search-container input:focus {
            border-color: #ffa116;
        }

        .search-container button {
            padding: 14px 28px;
            background: #ffa116;
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            white-space: nowrap;
        }

        .search-container button:hover {
            background: #ffb84d;
        }

        .search-container button:active {
            transform: scale(0.97);
        }

        .search-container button:disabled {
            background: #665a3a;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .loader {
            display: none;
            margin: 40px auto;
            width: 48px;
            height: 48px;
            border: 4px solid #2a2a4a;
            border-top: 4px solid #ffa116;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            display: none;
            background: #3a1a1a;
            border: 1px solid #ff4444;
            color: #ff6b6b;
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            max-width: 500px;
            text-align: center;
        }

        /* Profile card */
        .profile-card {
            display: none;
            background: #1e1e3a;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 36px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a4a;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffa116, #ff6b00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a2e;
            flex-shrink: 0;
        }

        .profile-header h2 {
            font-size: 1.5rem;
            color: #ffffff;
        }

        .profile-header p {
            color: #8a8a8a;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #16162e;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #3a3a5a;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #8a8a8a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card.total .value { color: #ffa116; }
        .stat-card.easy .value { color: #00b8a3; }
        .stat-card.medium .value { color: #ffc01e; }
        .stat-card.hard .value { color: #ef4743; }

        /* Difficulty bar */
        .difficulty-bar-container {
            margin-bottom: 28px;
        }

        .difficulty-bar-container h3 {
            font-size: 0.9rem;
            color: #8a8a8a;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .difficulty-bar {
            display: flex;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            background: #16162e;
        }

        .difficulty-bar .easy-bar {
            background: #00b8a3;
            transition: width 0.6s ease;
        }

        .difficulty-bar .medium-bar {
            background: #ffc01e;
            transition: width 0.6s ease;
        }

        .difficulty-bar .hard-bar {
            background: #ef4743;
            transition: width 0.6s ease;
        }

        .bar-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #8a8a8a;
        }

        .bar-legend span::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 6px;
            vertical-align: middle;
        }

        .bar-legend .easy-legend::before { background: #00b8a3; }
        .bar-legend .medium-legend::before { background: #ffc01e; }
        .bar-legend .hard-legend::before { background: #ef4743; }

        /* Ranking section */
        .ranking-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .ranking-card {
            background: #16162e;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        .ranking-card .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #b39ddb;
            margin-bottom: 6px;
        }

        .ranking-card .label {
            font-size: 0.85rem;
            color: #8a8a8a;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .ranking-section { grid-template-columns: 1fr; }
            .search-container { flex-direction: column; }
            .profile-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <h1>LeetCode Profile Viewer</h1>
    <p class="subtitle">Enter a LeetCode username to view their stats</p>

    <div class="search-container">
        <input type="text" id="usernameInput" placeholder="e.g. leetcode_user" autocomplete="off" />
        <button id="submitBtn" onclick="fetchProfile()">Submit</button>
    </div>

    <div class="loader" id="loader"></div>
    <div class="error-message" id="errorMsg"></div>

    <div class="profile-card" id="profileCard">
        <div class="profile-header">
            <div class="avatar" id="avatar"></div>
            <div>
                <h2 id="profileUsername"></h2>
                <p id="profileSubtitle"></p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card total">
                <div class="value" id="totalSolved">0</div>
                <div class="label">Total Solved</div>
            </div>
            <div class="stat-card easy">
                <div class="value" id="easySolved">0</div>
                <div class="label">Easy</div>
            </div>
            <div class="stat-card medium">
                <div class="value" id="mediumSolved">0</div>
                <div class="label">Medium</div>
            </div>
            <div class="stat-card hard">
                <div class="value" id="hardSolved">0</div>
                <div class="label">Hard</div>
            </div>
        </div>

        <div class="difficulty-bar-container">
            <h3>Problem Distribution</h3>
            <div class="difficulty-bar">
                <div class="easy-bar" id="easyBar"></div>
                <div class="medium-bar" id="mediumBar"></div>
                <div class="hard-bar" id="hardBar"></div>
            </div>
            <div class="bar-legend">
                <span class="easy-legend">Easy</span>
                <span class="medium-legend">Medium</span>
                <span class="hard-legend">Hard</span>
            </div>
        </div>

        <div class="ranking-section">
            <div class="ranking-card">
                <div class="value" id="contestRating">-</div>
                <div class="label">Contest Rating</div>
            </div>
            <div class="ranking-card">
                <div class="value" id="globalRank">-</div>
                <div class="label">Global Rank</div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('usernameInput');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');
        const profileCard = document.getElementById('profileCard');

        // Submit on Enter key
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') fetchProfile();
        });

        async function fetchProfile() {
            const username = input.value.trim();
            if (!username) {
                showError('Please enter a username.');
                return;
            }

            // Reset UI
            profileCard.style.display = 'none';
            errorMsg.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`/api/leetcode/${encodeURIComponent(username)}`);

                if (!response.ok) {
                    const text = await response.text();
                    let message = 'Failed to fetch profile.';
                    try {
                        const errJson = JSON.parse(text);
                        message = errJson.message || errJson.error || message;
                    } catch (_) {}
                    throw new Error(message);
                }

                const data = await response.json();
                renderProfile(data);
            } catch (err) {
                showError(err.message);
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        function renderProfile(data) {
            // Avatar initial
            const initial = (data.username || '?')[0].toUpperCase();
            document.getElementById('avatar').textContent = initial;

            // Header
            document.getElementById('profileUsername').textContent = data.username;
            document.getElementById('profileSubtitle').textContent =
                `${data.totalSolved || 0} problems solved`;

            // Stats
            document.getElementById('totalSolved').textContent = data.totalSolved ?? '-';
            document.getElementById('easySolved').textContent = data.easySolved ?? '-';
            document.getElementById('mediumSolved').textContent = data.mediumSolved ?? '-';
            document.getElementById('hardSolved').textContent = data.hardSolved ?? '-';

            // Difficulty bar
            const total = (data.easySolved || 0) + (data.mediumSolved || 0) + (data.hardSolved || 0);
            if (total > 0) {
                document.getElementById('easyBar').style.width = `${(data.easySolved / total * 100).toFixed(1)}%`;
                document.getElementById('mediumBar').style.width = `${(data.mediumSolved / total * 100).toFixed(1)}%`;
                document.getElementById('hardBar').style.width = `${(data.hardSolved / total * 100).toFixed(1)}%`;
            } else {
                document.getElementById('easyBar').style.width = '0%';
                document.getElementById('mediumBar').style.width = '0%';
                document.getElementById('hardBar').style.width = '0%';
            }

            // Rankings
            document.getElementById('contestRating').textContent =
                data.rating != null ? Math.round(data.rating) : '-';
            document.getElementById('globalRank').textContent =
                data.globalRank != null ? `#${data.globalRank.toLocaleString()}` : '-';

            profileCard.style.display = 'block';
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
